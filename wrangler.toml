name = "liquidity-radar-dexpaprika"
main = "feed/src/index.ts"
compatibility_date = "2025-05-01"

[[durable_objects.bindings]]
name = "RADAR"
class_name = "RadarDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RadarDO"] # SQLite-backed: deploys on the free plan

[triggers]
crons = ["*/5 * * * *"] # bootstraps the DO after deploy, keeps it alive

# Alerts go wherever you point WEBHOOK_URL (Discord webhooks are detected and
# get Discord's shape; anything else receives {text, alert} JSON). Without it,
# nothing leaves the worker; catches just show on the status page.
#   wrangler secret put WEBHOOK_URL
#
# Default watchlist is bundled from ./watchlist.json at deploy time. Edit
# that one file, run `npx wrangler deploy`, done. To override without a
# redeploy, set a WATCHLIST var/secret with the same JSON shape (~5KB cap).
#
# POST_SUFFIX is appended to every sent alert; defaults to a data-source
# credit ("data: dexpaprika.com"). Set POST_SUFFIX = "" to disable.

# Sending pace: per-pool cooldown and a global hourly cap, so a volatile
# pool can't flood your channel.
[vars]
POST_COOLDOWN_MINUTES = "30"
POSTS_PER_HOUR = "20"   # a frequent rug feed: lift the hourly cap so real drains aren't throttled (still per-pool cooldown above)
DRAIN_CONFIRM_SECONDS = "90"   # a drain must hold this long before it posts; a drop that refills is suppressed
POST_ADDS = "0"                # rug feed: drains only. set "1" to also post liquidity adds

# Drain detection thresholds. A move is flagged only if it is BOTH >= MIN_DRAIN_USD
# in absolute terms AND >= DRAIN_PCT of the pool's reserve. We want EVERY drain over
# $250 and nothing under, so the floor is $250. DRAIN_PCT is a low noise guard
# (5%): the real noise control is the swap filter (a drain needs the quote leg
# down with no token leg rising = a liquidity pull, not a sell), so the pct can be
# low without flooding. Drop DRAIN_PCT further to also catch sub-5% pulls from
# bigger pools; raise MIN_DRAIN_USD to focus on larger rugs. Tunable live.
MIN_DRAIN_USD = "250"
DRAIN_PCT = "0.05"

# Intent of a CONFIRMED drain (a labelled inference, never certain). On confirm we
# fetch the token's TOTAL liquidity (getTokenDetails) to tell a rug from a move:
#   rug       = pulled >= RUG_COMPLETENESS of the pool AND the token's liquidity is gone
#   migration = the token still has >= MIGRATION_MIN_USD of liquidity elsewhere (it moved)
#   exit      = a partial pull, not gutted, no clear migration
# Raise RUG_COMPLETENESS to be stricter about calling something a rug.
RUG_COMPLETENESS = "0.8"
MIGRATION_MIN_USD = "5000"

# Cold-start stream watchlist size per chain. Used only until the scanner has
# discovered enough candidates to fill the rug-scored rotate-and-pin selection.
# The free keyless reserve stream allows 3 connections per IP (probed live), 25
# subs each, so ~74 pools is the free ceiling; 37/chain packs into exactly 3
# connections. Bump only with an enterprise key that lifts the stream limit.
POOLS_PER_CHAIN = "37"

# Candidate discovery (tier 1): every SCAN_INTERVAL_SECONDS the DO cursor-pages
# through each chain's small + recently-created pools via /pools/search and ranks
# them by a composite RUG-RISK SCORE (age x turnover x thin-float x wash), NOT raw
# volume. A second pass pulls the newest high-volume pools (whose liquidity_usd the
# index reports as 0 until it backfills TVL) and deep-probes the top few via
# getPoolDetails for their real liquidity, so fresh rugs are discoverable. The
# top-scored pools fill the reserve-stream rotation. (Rising/draining are read from
# the live stream, not from REST liquidity_usd, which is too stale per probe.)
# SCAN_PAGES = cursor hops per chain per cycle x 100 pools (deeper = bigger
# discovery universe). With the enterprise key the REST burst limit is gone, so on
# a paid Workers plan we scan deep; on the free tier keep this ~4-6.
SCAN_PAGES = "15"
SCAN_INTERVAL_SECONDS = "60"

# Enrichment (tier 1b, KEY-GATED booster, no effect without DEXPAPRIKA_API_KEY):
# each scan cycle, deep-probe the top ENRICH_POOLS rug-scored candidates via
# getPoolDetails to (1) sharpen the score with short-window sell-skew and (2) read
# a per-swap-fresh quote reserve and PROMOTE pools that just moved sharply onto the
# stream (a wide REST pre-filter the rotation can't reach alone). Bounded so it
# never starves the alarm. Set "0" to disable; raise it on a paid Workers plan
# (more subrequest headroom) for wider REST coverage.
ENRICH_POOLS = "24"

# Proactively recycle the reserve-stream connections this often. A single wedged
# connection among several healthy ones keeps the global silence timer fresh and
# would rot undetected, so the whole subscription is re-established on this timer
# (reconnect is seamless; the metric does not drop). Default 600s.
STREAM_MAX_AGE_SECONDS = "600"

# On Cloudflare Workers the KEYED reserve stream delivers pings but no data
# (the streaming WAF accepts an Authorization'd SSE from worker IPs but doesn't
# feed it). So run the stream keyless here (free 3-connection tier, ~75 pools,
# which DOES deliver from workers) while the scanner keeps the full key. Remove
# this (or set "0") when running off Workers, or once the dev fixes keyed SSE
# for worker egress IPs, then the stream gets 7 connections / ~175 pools.
STREAM_KEYLESS = "1"

# OPTIONAL Pro/Enterprise API key. NOT set here (it's a secret); provide it with
#   npx wrangler secret put DEXPAPRIKA_API_KEY
# (local dev: put DEXPAPRIKA_API_KEY=... in a gitignored .dev.vars). When set:
#   - the reserve stream sends it as the bare Authorization header, lifting the
#     per-IP cap from 3 to 7 connections (~175 pools), and watchlist defaults
#     scale up;
#   - the REST scanner switches to api-pro.dexpaprika.com (key removes the burst
#     limit, so it scans ~12 pages/chain instead of 4). If api-pro's WAF ever
#     403s this IP, the scan falls back to the free host automatically.
# No key = the free tier, unchanged.
